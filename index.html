<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini Playground</title>
 <link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #1e1e1e;
    font-family: 'Consolas', 'Courier New', monospace;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    height: 100vh;
    background: #111;
  }
  .panel {
    display: flex;
    flex-direction: column;
    background: #252526;
    overflow: hidden;
  }
  .panel-label {
    background: #333;
    color: #ccc;
    font-size: 12px;
    padding: 6px 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid #111;
    user-select: none;
  }
  textarea {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    line-height: 1.5;
  }
  #view-box .panel-label { background: #0a5c2e; color: #fff; }
  iframe { flex: 1; border: none; background: #fff; }
</style>
</head>
<body>

<div class="grid">

  <div class="panel" id="html-box">
    <div class="panel-label">HTML</div>
    <textarea id="htmlCode" spellcheck="false">&lt;h1&gt;Привет!&lt;/h1&gt;
&lt;p&gt;Пиши код слева, результат появится справа.&lt;/p&gt;
&lt;button id="btn"&gt;Нажми меня&lt;/button&gt;</textarea>
  </div>

  <div class="panel" id="css-box">
    <div class="panel-label">CSS</div>
    <textarea id="cssCode" spellcheck="false">body {
  font-family: sans-serif;
  padding: 20px;
  color: #222;
}
h1 {
  color: #e06c75;
}
button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #61afef;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
button:hover {
  background: #4a9be0;
}</textarea>
  </div>

  <div class="panel" id="js-box">
    <div class="panel-label">JavaScript</div>
    <textarea id="jsCode" spellcheck="false">document.getElementById('btn').addEventListener('click', () => {
  alert('Работает!');
});</textarea>
  </div>

  <div class="panel" id="view-box">
    <div class="panel-label">Результат</div>
    <iframe id="preview"></iframe>
  </div>

</div>

<script>
  const htmlCode = document.getElementById('htmlCode');
  const cssCode = document.getElementById('cssCode');
  const jsCode = document.getElementById('jsCode');
  const preview = document.getElementById('preview');

  function render() {
    const doc = `<!DOCTYPE html>
<html>
<head><style>${cssCode.value}</style></head>
<body>
${htmlCode.value}
<script>
try {
${jsCode.value}
} catch (e) {
  document.body.insertAdjacentHTML('beforeend', '<pre style="color:red;white-space:pre-wrap;">' + e + '</pre>');
}
<\/script>
</body>
</html>`;
    preview.srcdoc = doc;
  }

  let timeout;
  function scheduleRender() {
    clearTimeout(timeout);
    timeout = setTimeout(render, 300);
  }

  [htmlCode, cssCode, jsCode].forEach(el => el.addEventListener('input', scheduleRender));

  render();
</script>

</body>
</html>
